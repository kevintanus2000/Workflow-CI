name: ML Workflow CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Checkout repository
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3
      # Set up Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      # Check environment
      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Working directory: $(pwd)"
          echo "Files in repo:"
          ls -la
          echo "Files in MLProject:"
          ls -la MLProject/
      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "mlflow==2.19.0" \
            "scikit-learn>=1.3.0" \
            "pandas>=2.0.0" \
            "numpy>=1.24.0" \
            "matplotlib>=3.7.0" \
            "seaborn>=0.12.0" \
            "joblib>=1.3.0" \
            "protobuf>=5.0" \
            "dagshub"
          # Install conda for mlflow run
          pip install conda-pack
      # Run MLflow Project
      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . \
            --env-manager=local \
            --experiment-name "Iris_Modelling_Tuning" \
            -P dummy=0 2>&1 | tee ../mlflow_run.log || true
          echo "MLflow run completed"
        env:
          MLFLOW_TRACKING_URI: "file:///home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}/MLProject/mlruns"
      # Get latest MLflow run_id
      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          cd MLProject
          RUN_ID=$(python - <<'EOF'
          import mlflow
          import os

          tracking_uri = "file:///home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}/MLProject/mlruns"
          mlflow.set_tracking_uri(tracking_uri)
          client = mlflow.tracking.MlflowClient()

          experiments = client.search_experiments()
          latest_run = None
          latest_time = 0

          for exp in experiments:
              runs = client.search_runs(
                  experiment_ids=[exp.experiment_id],
                  order_by=["start_time DESC"],
                  max_results=1
              )
              if runs and runs[0].info.start_time > latest_time:
                  latest_time = runs[0].info.start_time
                  latest_run = runs[0]

          if latest_run:
              print(latest_run.info.run_id)
          else:
              print("no_run_found")
          EOF
          )
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Latest MLflow Run ID: $RUN_ID"
      # Install Python dependencies (for upload)
      - name: Install Python dependencies
        run: |
          pip install gitpython requests
      # Upload artifacts to GitHub (same repo)
      - name: Upload to GitHub
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Set remote URL dengan token agar bisa push
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          mkdir -p MLProject/artifacts/run_${{ env.RUN_ID }}

          if [ -d "MLProject/mlruns" ]; then
            cp -r MLProject/mlruns MLProject/artifacts/run_${{ env.RUN_ID }}/
          fi

          if [ -f "mlflow_run.log" ]; then
            cp mlflow_run.log MLProject/artifacts/run_${{ env.RUN_ID }}/
          fi

          echo "Run ID: ${{ env.RUN_ID }}" > MLProject/artifacts/run_${{ env.RUN_ID }}/run_info.txt
          echo "Timestamp: $(date -u)" >> MLProject/artifacts/run_${{ env.RUN_ID }}/run_info.txt
          echo "Triggered by: ${{ github.actor }}" >> MLProject/artifacts/run_${{ env.RUN_ID }}/run_info.txt
          echo "Commit: ${{ github.sha }}" >> MLProject/artifacts/run_${{ env.RUN_ID }}/run_info.txt

          git add MLProject/artifacts/
          git diff --staged --quiet || git commit -m "ci: save MLflow artifacts for run ${{ env.RUN_ID }} [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Build Docker Image using mlflow build-docker
      - name: Build Docker Model
        run: |
          # Install Docker (already available on ubuntu-latest)
          docker --version

          # Build docker image from the best MLflow model
          MODEL_URI="MLProject/mlruns/0/${{ env.RUN_ID }}/artifacts/model"

          if [ -d "$MODEL_URI" ]; then
            echo "Building Docker image from model at: $MODEL_URI"
            mlflow models build-docker \
              -m "$MODEL_URI" \
              -n "${{ secrets.WORKFLOW_CI_DOCKER_USERNAME }}/workflow-ci-model:${{ env.RUN_ID }}" \
              --enable-mlserver
          else
            # Fallback: search for model artifact
            MODEL_URI=$(find MLProject/mlruns -name "MLmodel" | head -1 | xargs dirname 2>/dev/null || echo "")
            if [ -n "$MODEL_URI" ]; then
              echo "Found model at: $MODEL_URI"
              mlflow models build-docker \
                -m "$MODEL_URI" \
                -n "${{ secrets.WORKFLOW_CI_DOCKER_USERNAME }}/workflow-ci-model:${{ env.RUN_ID }}" \
                --enable-mlserver
            else
              echo "No MLflow model found, skipping Docker build"
              exit 1
            fi
          fi
      # Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.WORKFLOW_CI_DOCKER_USERNAME }}
          password: ${{ secrets.WORKFLOW_CI_DOCKER }}
      # Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag \
            ${{ secrets.WORKFLOW_CI_DOCKER_USERNAME }}/workflow-ci-model:${{ env.RUN_ID }} \
            ${{ secrets.WORKFLOW_CI_DOCKER }}/workflow-ci-model:latest

          echo "Tagged images:"
          docker images | grep workflow-ci-model
      # Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.WORKFLOW_CI_DOCKER_USERNAME }}/workflow-ci-model:${{ env.RUN_ID }}
          docker push ${{ secrets.WORKFLOW_CI_DOCKER_USERNAME }}/workflow-ci-model:latest
          echo "Pushed to Docker Hub:"
          echo "  ${{ secrets.WORKFLOW_CI_DOCKER_USERNAME }}/workflow-ci-model:${{ env.RUN_ID }}"
          echo "  ${{ secrets.WORKFLOW_CI_DOCKER_USERNAME }}/workflow-ci-model:latest"
